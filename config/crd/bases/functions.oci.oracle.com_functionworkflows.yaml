---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: functionworkflows.functions.oci.oracle.com
spec:
  group: functions.oci.oracle.com
  names:
    categories:
    - oci
    - functions
    kind: FunctionWorkflow
    listKind: FunctionWorkflowList
    plural: functionworkflows
    singular: functionworkflow
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: FunctionWorkflow is the Schema for reusable function workflow
          DAG templates.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FunctionWorkflowSpec defines the desired DAG template for
              workflow runs.
            properties:
              nodes:
                description: Nodes are the named function invocation steps in this
                  DAG.
                items:
                  description: FunctionWorkflowNode describes one function invocation
                    node in a workflow DAG.
                  properties:
                    dependsOn:
                      description: DependsOn lists node names that must complete successfully
                        before this node starts.
                      items:
                        maxLength: 63
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                        type: string
                      type: array
                      x-kubernetes-list-type: set
                    function:
                      description: Function is an inline Function spec used to create
                        a child Function for this workflow run.
                      properties:
                        config:
                          description: Config describes desired function configuration
                            for managed lifecycle.
                          properties:
                            applicationName:
                              description: ApplicationName is the display name of
                                the OCI Functions application to ensure.
                              maxLength: 255
                              minLength: 1
                              type: string
                            applicationOcid:
                              description: |-
                                ApplicationOCID is an existing OCI Functions application OCID.
                                Deprecated: use applicationName and subnetIds for managed application reconciliation.
                              pattern: ^ocid1\.fnapp\..+
                              type: string
                            compartmentId:
                              description: CompartmentID is the compartment OCID for
                                the managed application/function.
                              pattern: ^ocid1\.compartment\..+
                              type: string
                            config:
                              additionalProperties:
                                type: string
                              description: Config is the OCI function configuration
                                map.
                              type: object
                            displayName:
                              description: DisplayName is the OCI function display
                                name.
                              maxLength: 255
                              minLength: 1
                              type: string
                            environment:
                              additionalProperties:
                                type: string
                              description: |-
                                Environment is a deprecated alias for Config.
                                Deprecated: use config.
                              type: object
                            freeformTags:
                              additionalProperties:
                                type: string
                              description: FreeformTags are OCI freeform tags to apply
                                to managed resources.
                              type: object
                            image:
                              description: |-
                                Image is the OCI Functions-compatible runtime image reference.
                                Managed functions should use a same-region OCIR image, such as jed.ocir.io/... for me-jeddah-1.
                              minLength: 1
                              type: string
                            memoryInMB:
                              description: |-
                                MemoryInMB is a deprecated alias for MemoryInMBs.
                                Deprecated: use memoryInMBs.
                              enum:
                              - 128
                              - 256
                              - 512
                              - 1024
                              - 2048
                              format: int32
                              type: integer
                            memoryInMBs:
                              default: 128
                              description: MemoryInMBs is the memory size to configure.
                              enum:
                              - 128
                              - 256
                              - 512
                              - 1024
                              - 2048
                              format: int32
                              type: integer
                            nsgIds:
                              description: |-
                                NSGIDs are the Network Security Group OCIDs to attach to the managed OCI Functions application.
                                When omitted, the operator leaves NSGs unmanaged on existing applications.
                                Set an empty list to explicitly clear all NSGs from an existing application.
                                Set a non-empty list to create new applications with those NSGs and reconcile existing applications to that set.
                              items:
                                pattern: ^ocid1\.networksecuritygroup\..+
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                            region:
                              description: Region is the OCI region identifier, such
                                as me-jeddah-1.
                              minLength: 1
                              type: string
                            subnetIds:
                              description: SubnetIDs are the subnet OCIDs for a newly
                                created application.
                              items:
                                type: string
                              minItems: 1
                              type: array
                              x-kubernetes-list-type: atomic
                            timeoutInSeconds:
                              default: 30
                              description: TimeoutInSeconds is the max execution time
                                for the function.
                              format: int32
                              maximum: 300
                              minimum: 1
                              type: integer
                          required:
                          - applicationName
                          - compartmentId
                          - displayName
                          - image
                          - region
                          - subnetIds
                          type: object
                        existingFunctionOcid:
                          description: |-
                            ExistingFunctionOCID points at an existing OCI Functions function.
                            Deprecated: use FunctionID.
                          pattern: ^ocid1\.fnfunc\..+
                          type: string
                        functionId:
                          description: FunctionID points at an existing OCI Functions
                            function OCID.
                          pattern: ^ocid1\.fnfunc\..+
                          type: string
                        invokeEndpoint:
                          description: |-
                            InvokeEndpoint is the OCI Functions invoke endpoint for an existing function.
                            Managed functions discover this endpoint into status.
                          pattern: ^https?://.+
                          type: string
                        mode:
                          description: |-
                            Mode selects whether the operator references an existing OCI Function or manages one.
                            When omitted, mode is inferred from functionId/existingFunctionOcid or config.
                          enum:
                          - Existing
                          - Managed
                          type: string
                      type: object
                      x-kubernetes-validations:
                      - message: one of spec.functionId, spec.existingFunctionOcid,
                          or spec.config is required
                        rule: has(self.functionId) || has(self.existingFunctionOcid)
                          || has(self.config)
                      - message: spec.config is mutually exclusive with existing function
                          references
                        rule: '!(has(self.config) && (has(self.functionId) || has(self.existingFunctionOcid)))'
                      - message: spec.functionId and spec.existingFunctionOcid are
                          mutually exclusive
                        rule: '!(has(self.functionId) && has(self.existingFunctionOcid))'
                      - message: existing Function mode requires spec.invokeEndpoint
                        rule: '!(has(self.functionId) || has(self.existingFunctionOcid))
                          || has(self.invokeEndpoint)'
                      - message: mode Existing requires spec.functionId or spec.existingFunctionOcid
                          and spec.invokeEndpoint
                        rule: '!has(self.mode) || self.mode != ''Existing'' || ((has(self.functionId)
                          || has(self.existingFunctionOcid)) && has(self.invokeEndpoint))'
                      - message: mode Managed requires spec.config
                        rule: '!has(self.mode) || self.mode != ''Managed'' || has(self.config)'
                    functionRef:
                      description: FunctionRef references a Function in the same namespace
                        as the workflow run.
                      properties:
                        name:
                          description: Name is the referenced Function name.
                          minLength: 1
                          type: string
                      required:
                      - name
                      type: object
                    name:
                      description: Name is the stable node identifier used by dependsOn
                        and status.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    parallelism:
                      default: 1
                      description: Parallelism is passed through to the child FunctionJob.
                      format: int32
                      maximum: 100
                      minimum: 1
                      type: integer
                    payload:
                      description: Payload is the inline JSON object passed to the
                        child FunctionJob as a single payload item.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    retryLimit:
                      default: 0
                      description: RetryLimit is passed through to the child FunctionJob.
                      format: int32
                      maximum: 10
                      minimum: 0
                      type: integer
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of functionRef or function is required
                    rule: has(self.functionRef) != has(self.function)
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - nodes
            type: object
          status:
            description: FunctionWorkflowStatus defines the observed state of FunctionWorkflow.
            properties:
              conditions:
                description: Conditions contain workflow template validation state
                  when available.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the last metadata.generation observed
                  by a controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
