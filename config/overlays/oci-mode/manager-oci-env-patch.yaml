apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
spec:
  template:
    spec:
      containers:
      - name: manager
        env:
        - name: INVOKER_MODE
          value: null
          valueFrom:
            configMapKeyRef:
              name: oci-functions-operator-oci-mode
              key: INVOKER_MODE
        - name: OCI_AUTH_MODE
          valueFrom:
            configMapKeyRef:
              name: oci-functions-operator-oci-mode
              key: OCI_AUTH_MODE
        - name: OCI_FUNCTIONS_INVOKE_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: oci-functions-operator-oci-mode
              key: OCI_FUNCTIONS_INVOKE_ENDPOINT
        - name: OCI_RESOURCE_PRINCIPAL_VERSION
          valueFrom:
            configMapKeyRef:
              name: oci-functions-operator-oci-mode
              key: OCI_RESOURCE_PRINCIPAL_VERSION
        - name: OCI_RESOURCE_PRINCIPAL_REGION
          valueFrom:
            configMapKeyRef:
              name: oci-functions-operator-oci-mode
              key: OCI_RESOURCE_PRINCIPAL_REGION
