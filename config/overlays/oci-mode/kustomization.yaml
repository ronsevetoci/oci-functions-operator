namespace: oci-functions-operator-system

resources:
- ../../default

configMapGenerator:
- name: oci-functions-operator-oci-mode
  literals:
  - INVOKER_MODE=oci
  - OCI_AUTH_MODE=workload
  - OCI_RESOURCE_PRINCIPAL_VERSION=2.2
  - OCI_RESOURCE_PRINCIPAL_REGION=replace-with-oci-region

patches:
# OKE path uses Workload Identity. Do not mount OCI config files, PEM keys,
# or developer credential Secrets in this overlay.
- path: manager-oci-env-patch.yaml

generatorOptions:
  disableNameSuffixHash: true
