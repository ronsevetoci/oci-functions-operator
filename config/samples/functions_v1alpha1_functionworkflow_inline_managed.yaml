apiVersion: functions.oci.oracle.com/v1alpha1
kind: FunctionWorkflow
metadata:
  name: managed-inline-workflow
spec:
  nodes:
  - name: prepare
    function:
      mode: Managed
      config:
        region: me-jeddah-1
        compartmentId: <COMPARTMENT_OCID>
        applicationName: oke-functions-operator-workflow
        subnetIds:
        - <SUBNET_OCID>
        # Optional. If NSGs are attached, they must allow egress TCP 443 to Oracle Services Network/OCIR.
        # nsgIds:
        # - <NSG_OCID>
        displayName: managed-inline-prepare
        image: jed.ocir.io/<TENANCY_NAMESPACE>/hello-function:<tag>
        memoryInMBs: 256
        timeoutInSeconds: 120
        config:
          STEP: prepare
    payload:
      step: prepare
      message: prepare workflow input
    retryLimit: 1
  - name: process
    function:
      mode: Managed
      config:
        region: me-jeddah-1
        compartmentId: <COMPARTMENT_OCID>
        applicationName: oke-functions-operator-workflow
        subnetIds:
        - <SUBNET_OCID>
        # nsgIds:
        # - <NSG_OCID>
        displayName: managed-inline-process
        image: jed.ocir.io/<TENANCY_NAMESPACE>/hello-function:<tag>
        memoryInMBs: 256
        timeoutInSeconds: 120
        config:
          STEP: process
    dependsOn:
    - prepare
    payload:
      step: process
      message: process prepared input
    retryLimit: 1
  - name: notify
    function:
      mode: Managed
      config:
        region: me-jeddah-1
        compartmentId: <COMPARTMENT_OCID>
        applicationName: oke-functions-operator-workflow
        subnetIds:
        - <SUBNET_OCID>
        # nsgIds:
        # - <NSG_OCID>
        displayName: managed-inline-notify
        image: jed.ocir.io/<TENANCY_NAMESPACE>/hello-function:<tag>
        memoryInMBs: 256
        timeoutInSeconds: 120
        config:
          STEP: notify
    dependsOn:
    - process
    payload:
      step: notify
      message: workflow complete
    retryLimit: 1
