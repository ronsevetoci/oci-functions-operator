replicaCount: 1

image:
  repository: ghcr.io/ronsevet/oci-functions-operator/controller
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

oci:
  invokerMode: oci
  authMode: workload
  resourcePrincipalVersion: "2.2"
  resourcePrincipalRegion: ""

serviceAccount:
  create: true
  name: oci-functions-operator-controller-manager
  annotations: {}

rbac:
  create: true

leaderElection:
  enabled: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

metrics:
  port: 8080
  service:
    enabled: true
    type: ClusterIP
    port: 8080

health:
  port: 8081

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

extraEnv: []

nodeSelector: {}
tolerations: []
affinity: {}
